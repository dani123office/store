version: "2"
type: frontend
tech_stack:
  - language: JavaScript
  - framework: React
  - ui_library: Tailwind CSS
  - other: Vite
routes:
  - path: /login
    file: frontend/src/pages/Login.jsx
    auth_required: false
    description: User login page
  - path: /register
    file: frontend/src/pages/Register.jsx
    auth_required: false
    description: User registration page
  - path: /
    file: frontend/src/pages/Dashboard.jsx
    auth_required: true
    description: Agent dashboard home page
  - path: /profile
    file: frontend/src/pages/ProfileSettings.jsx
    auth_required: true
    description: User profile and settings page
  - path: /callbacks
    file: frontend/src/pages/Callbacks.jsx
    auth_required: true
    description: Agent callback list and workflow page
  - path: /callbacks/add
    file: frontend/src/pages/AddCallback.jsx
    auth_required: true
    description: Create new callback entry
  - path: /callbacks/:id
    file: frontend/src/pages/CallbackDetail.jsx
    auth_required: true
    description: Callback detail review page
  - path: /callbacks/:id/edit
    file: frontend/src/pages/AddCallback.jsx
    auth_required: true
    description: Edit callback page
  - path: /transfers
    file: frontend/src/pages/Transfers.jsx
    auth_required: true
    description: Agent transfers list page
  - path: /transfers/add
    file: frontend/src/pages/AddTransfer.jsx
    auth_required: true
    description: Create a new transfer request
  - path: /transfers/:id
    file: frontend/src/pages/TransferDetail.jsx
    auth_required: true
    description: Transfer detail and status page
  - path: /transfers/:id/edit
    file: frontend/src/pages/EditTransfer.jsx
    auth_required: true
    description: Edit transfer details page
  - path: /sales
    file: frontend/src/pages/Sales.jsx
    auth_required: true
    description: Sales list and overview page
  - path: /sales/apply
    file: frontend/src/pages/SaleApplication.jsx
    auth_required: true
    description: Submit a new sale application
  - path: /sales/:id
    file: frontend/src/pages/SaleDetail.jsx
    auth_required: true
    description: Sale detail page
  - path: /customers
    file: frontend/src/pages/Customers.jsx
    auth_required: true
    description: Customer list page
  - path: /customers/:id
    file: frontend/src/pages/CustomerDetail.jsx
    auth_required: true
    description: Customer detail page
  - path: /manager
    file: frontend/src/pages/manager/TeamDashboard.jsx
    auth_required: true
    description: Manager team dashboard
  - path: /manager/agents
    file: frontend/src/pages/manager/ManagerAgentsList.jsx
    auth_required: true
    description: Manager agent list page
  - path: /manager/agents/:id
    file: frontend/src/pages/manager/AgentDetail.jsx
    auth_required: true
    description: Manager view of agent details
  - path: /manager/callbacks
    file: frontend/src/pages/manager/ManagerCallbacks.jsx
    auth_required: true
    description: Manager callback oversight page
  - path: /manager/callbacks/:id
    file: frontend/src/pages/manager/ManagerCallbackDetail.jsx
    auth_required: true
    description: Manager callback detail page
  - path: /manager/transfers
    file: frontend/src/pages/manager/ManagerTransfers.jsx
    auth_required: true
    description: Manager transfer oversight page
  - path: /manager/transfers/:id
    file: frontend/src/pages/manager/ManagerTransferDetail.jsx
    auth_required: true
    description: Manager transfer detail page
  - path: /manager/sales
    file: frontend/src/pages/manager/ManagerSales.jsx
    auth_required: true
    description: Manager sales overview page
  - path: /manager/notifications
    file: frontend/src/pages/manager/ManagerNotifications.jsx
    auth_required: true
    description: Manager notifications page
  - path: /admin
    file: frontend/src/pages/admin/AdminDashboard.jsx
    auth_required: true
    description: Admin dashboard page
  - path: /admin/managers
    file: frontend/src/pages/admin/ManagersPage.jsx
    auth_required: true
    description: Admin manager management page
  - path: /admin/agents
    file: frontend/src/pages/admin/AgentsPage.jsx
    auth_required: true
    description: Admin agent management page
  - path: /admin/analytics
    file: frontend/src/pages/admin/AdminDashboard.jsx
    auth_required: true
    description: Admin analytics dashboard page
  - path: /admin/activity
    file: frontend/src/pages/admin/AdminDashboard.jsx
    auth_required: true
    description: Admin activity stream page
features:
  - name: User Login
    description: Authenticate existing users and obtain a session token
    files:
      - frontend/src/pages/Login.jsx
      - frontend/src/store/authStore.js
    entry_route: /login
    user_interactions:
      - Enter email in login form
      - Enter password in login form
      - Click submit / Login button
      - See validation or authentication error message
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: User Registration
    description: Register a new user account and optionally choose a role
    files:
      - frontend/src/pages/Register.jsx
      - frontend/src/store/authStore.js
    entry_route: /register
    user_interactions:
      - Enter name, email, and password
      - Select or confirm role if available
      - Click Register button
      - See confirmation or error message
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Callback management
    description: View, create, edit, and inspect callback records
    files:
      - frontend/src/pages/Callbacks.jsx
      - frontend/src/pages/AddCallback.jsx
      - frontend/src/pages/CallbackDetail.jsx
      - frontend/src/store/dataStore.js
    entry_route: /callbacks
    user_interactions:
      - Navigate to callbacks list
      - Click Add Callback
      - Fill callback form fields and submit
      - Open a callback detail page
      - Edit existing callback and save changes
    api_calls:
      - method: GET
        endpoint: /api/callbacks
      - method: POST
        endpoint: /api/callbacks
      - method: PUT
        endpoint: /api/callbacks/{id}
      - method: DELETE
        endpoint: /api/callbacks/{id}
    auth_required: true
  - name: Transfer management
    description: Create, list, edit, and inspect transfer records
    files:
      - frontend/src/pages/Transfers.jsx
      - frontend/src/pages/AddTransfer.jsx
      - frontend/src/pages/TransferDetail.jsx
      - frontend/src/pages/EditTransfer.jsx
      - frontend/src/store/dataStore.js
    entry_route: /transfers
    user_interactions:
      - Navigate to transfers
      - Click Add Transfer
      - Complete transfer form and submit
      - Open transfer detail page
      - Edit transfer details and save
    api_calls:
      - method: GET
        endpoint: /api/transfers
      - method: POST
        endpoint: /api/transfers
      - method: PUT
        endpoint: /api/transfers/{id}
      - method: DELETE
        endpoint: /api/transfers/{id}
    auth_required: true
  - name: Sales workflow
    description: Manage sales applications and view sale details
    files:
      - frontend/src/pages/Sales.jsx
      - frontend/src/pages/SaleApplication.jsx
      - frontend/src/pages/SaleDetail.jsx
      - frontend/src/store/dataStore.js
    entry_route: /sales
    user_interactions:
      - View sales list
      - Click apply for new sale
      - Fill sale application and submit
      - Open sale detail page
    api_calls:
      - method: GET
        endpoint: /api/sales
      - method: POST
        endpoint: /api/sales
      - method: PUT
        endpoint: /api/sales/{id}
      - method: DELETE
        endpoint: /api/sales/{id}
    auth_required: true
  - name: Customer management
    description: Browse customers and view customer records
    files:
      - frontend/src/pages/Customers.jsx
      - frontend/src/pages/CustomerDetail.jsx
      - frontend/src/store/dataStore.js
    entry_route: /customers
    user_interactions:
      - Navigate to customer list
      - Open a customer detail page
      - Create or edit customer data if available
    api_calls:
      - method: GET
        endpoint: /api/customers
      - method: POST
        endpoint: /api/customers
      - method: PUT
        endpoint: /api/customers/{id}
      - method: DELETE
        endpoint: /api/customers/{id}
    auth_required: true
  - name: Manager oversight
    description: Managers can review team callbacks, transfers, and sales
    files:
      - frontend/src/pages/manager/TeamDashboard.jsx
      - frontend/src/pages/manager/ManagerCallbacks.jsx
      - frontend/src/pages/manager/ManagerTransfers.jsx
      - frontend/src/pages/manager/ManagerSales.jsx
      - frontend/src/store/managerStore.js
    entry_route: /manager
    user_interactions:
      - Log in as manager
      - Navigate to team dashboard
      - Review callbacks, transfers, and sales lists
      - Open manager callback or transfer details
    api_calls:
      - method: GET
        endpoint: /api/manager/team-stats
      - method: GET
        endpoint: /api/manager/callbacks
      - method: GET
        endpoint: /api/manager/transfers
      - method: GET
        endpoint: /api/manager/sales
    auth_required: true
  - name: Admin user management
    description: Admin users manage managers, agents, and system analytics
    files:
      - frontend/src/pages/admin/AdminDashboard.jsx
      - frontend/src/pages/admin/ManagersPage.jsx
      - frontend/src/pages/admin/AgentsPage.jsx
      - frontend/src/lib/api.js
    entry_route: /admin
    user_interactions:
      - Log in as admin
      - View admin dashboard and analytics sections
      - Browse managers and agent lists
      - Create or manage users if UI options are present
    api_calls:
      - method: GET
        endpoint: /api/admin/managers
      - method: GET
        endpoint: /api/admin/agents
      - method: POST
        endpoint: /api/admin/create-manager
      - method: POST
        endpoint: /api/admin/create-agent
    auth_required: true
known_limitations:
  - issue: No existing TestSprite or end-to-end test harness found in repo
    location: frontend/src
    impact: Automated UI tests must be generated from scratch using the current frontend code
  - issue: Role-based routes require a valid auth token for access
    location: frontend/src/App.jsx
    impact: Manager/admin sections are inaccessible without authenticated login and valid role
