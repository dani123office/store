name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Starting deployment..."
            
            # Navigate to project directory (Change this path if your project is in a different directory)
            cd /var/www/zarkacouture
            
            # Pull latest changes from GitHub
            git pull origin main
            
            # --- 1. Frontend Setup ---
            echo "Building frontend..."
            npm install
            npm run build
            
            # --- 2. Backend Setup ---
            echo "Setting up backend..."
            cd backend
            composer install --no-dev --optimize-autoloader
            
            # Run database migrations
            php artisan migrate --force
            
            # Clear & Cache Laravel configurations
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Restart queue worker (if running)
            php artisan queue:restart || true
            
            echo "Deployment completed successfully!"
