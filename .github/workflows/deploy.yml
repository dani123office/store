name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          npm install
          npm run build

      - name: Copy Frontend Build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: "/var/www/store"
          timeout: 120s

      - name: Run Backend Deploy Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Starting backend deployment..."
            
            cd /var/www/store
            
            # Pull latest changes from GitHub
            git pull origin main
            
            # --- Docker Backend Build & Run ---
            echo "Building Docker backend image..."
            docker build -t store-backend /var/www/store/backend
            
            echo "Stopping old backend container..."
            docker stop store-backend-container || true
            docker rm store-backend-container || true
            
            echo "Starting new backend container..."
            # Mount host database folder to persist database.sqlite
            mkdir -p /var/www/store/backend/database
            docker run -d --name store-backend-container -p 8001:80 --restart always -v /var/www/store/backend/database:/var/www/html/database store-backend
            
            # Fix permissions on SQLite database mount
            echo "Setting database folder permissions..."
            chown -R 33:33 /var/www/store/backend/database || true
            chmod -R 777 /var/www/store/backend/database || true
            
            # --- Update Nginx Config ---
            echo "Updating Nginx configuration..."
            # Add client_max_body_size to store-ip if not present
            if [ -f /etc/nginx/sites-available/store-ip ]; then
                if ! grep -q "client_max_body_size" /etc/nginx/sites-available/store-ip; then
                    sed -i '/server_name _;/a \    client_max_body_size 20M;' /etc/nginx/sites-available/store-ip
                else
                    sed -i 's/client_max_body_size [0-9]\+M;/client_max_body_size 20M;/g' /etc/nginx/sites-available/store-ip
                fi
            fi
            
            # Add client_max_body_size to zarkacouture.com if not present
            if [ -f /etc/nginx/sites-available/zarkacouture.com ]; then
                if ! grep -q "client_max_body_size" /etc/nginx/sites-available/zarkacouture.com; then
                    sed -i '/server_name zarkacouture.com www.zarkacouture.com;/a \    client_max_body_size 20M;' /etc/nginx/sites-available/zarkacouture.com
                else
                    sed -i 's/client_max_body_size [0-9]\+M;/client_max_body_size 20M;/g' /etc/nginx/sites-available/zarkacouture.com
                fi
            fi
            
            nginx -t
            systemctl reload nginx
            
            echo "Deployment completed successfully!"
